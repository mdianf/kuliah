<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Modul 24 — Daftar Materi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #1A1D29;
  --paper:   #FAF8F4;
  --line:    #DDD7C8;
  --accent:  #3D5A80;
  --muted:   #8B8474;
}

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Georgia', 'Times New Roman', serif;
  min-height: 100vh;
}

.wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 8vh 6vw 10vh;
}

.breadcrumb {
  font-family: 'Courier New', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 1.5em;
}
.breadcrumb a { color: var(--accent); text-decoration: none; }
.breadcrumb a:hover { text-decoration: underline; }

header {
  margin-bottom: 6vh;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 2em;
}
.kicker {
  font-family: 'Courier New', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.8em;
}
h1 {
  font-size: clamp(2rem, 5.5vw, 3rem);
  font-weight: 400;
  letter-spacing: -0.01em;
}

.materi-list { display: flex; flex-direction: column; }

.materi {
  display: block;
  text-decoration: none;
  color: inherit;
  border-bottom: 1px solid var(--line);
  padding: 1.6em 0;
  transition: padding-left 0.25s ease;
}
.materi:first-child { padding-top: 0; }
.materi:hover { padding-left: 0.6em; }
.materi:hover .materi-title { color: var(--accent); }
.materi:hover .arrow { transform: translateX(4px); opacity: 1; }

.materi-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1em;
}
.materi-num {
  font-family: 'Courier New', monospace;
  font-size: 0.8rem;
  color: var(--muted);
  margin-right: 0.8em;
}
.materi-title {
  font-size: clamp(1.05rem, 2.5vw, 1.3rem);
  font-weight: 400;
  transition: color 0.25s ease;
}
.materi-date {
  font-family: 'Courier New', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  white-space: nowrap;
}
.arrow {
  font-size: 1.2rem;
  color: var(--accent);
  opacity: 0.4;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

footer {
  margin-top: 6vh;
  padding-top: 2em;
  border-top: 1px solid var(--line);
  font-family: 'Courier New', monospace;
  font-size: 0.7rem;
  color: var(--muted);
}

@media (max-width: 600px) {
  .wrap { padding: 6vh 6vw 8vh; }
  .materi-date { display: none; }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="breadcrumb"><a href="../">Portal Kuliah</a> &nbsp;/&nbsp; Modul 24</div>

  <header>
    <div class="kicker">Daftar Materi</div>

  </header>

  <div class="materi-list">

        <div style="display:flex; align-items:center; gap:1em;">
          
          <span class="arrow">→</span>
        </div>
      </div>
    </a>
    <a class="materi" href="bondingv3.html">
      <div class="materi-row">
        <div><span class="materi-num">02</span><span class="materi-title">Bonding</span></div>
        <div style="display:flex; align-items:center; gap:1em;">
         
          <span class="arrow">→</span>
        </div>
      </div>
    </a>
    <a class="materi" href="resinkomposit2.html">
      <div class="materi-row">
        <div><span class="materi-num">03</span><span class="materi-title">Resin Komposit 2</span></div>
        <div style="display:flex; align-items:center; gap:1em;">
         
          <span class="arrow">→</span>
        </div>
      </div>
    </a>
        <a class="materi" href="dental-ceramic.html">

    <!-- [GANTI] tambah materi lain di sini -->

  </div>

  <footer>← Kembali ke <a href="../" style="color:var(--accent)">Portal Kuliah</a></footer>

</div>

</body>
</html>
