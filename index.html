<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal Kuliah</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:     #1A1D29;
  --paper:   #FAF8F4;
  --line:    #DDD7C8;
  --accent:  #3D5A80;
  --accent2: #98512C;
  --muted:   #8B8474;
}

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Georgia', 'Times New Roman', serif;
  min-height: 100vh;
}

.wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 8vh 6vw 10vh;
}

/* ── HEADER ── */
header {
  margin-bottom: 6vh;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 2em;
}
.kicker {
  font-family: 'Courier New', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.8em;
}
h1 {
  font-size: clamp(2.2rem, 6vw, 3.4rem);
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.1;
}
h1 em { font-style: italic; color: var(--accent); }
.tagline {
  margin-top: 0.8em;
  font-style: italic;
  color: var(--muted);
  font-size: 1.05rem;
}

/* ── MATA KULIAH LIST ── */
.courses { display: flex; flex-direction: column; }

.course {
  display: block;
  text-decoration: none;
  color: inherit;
  border-bottom: 1px solid var(--line);
  padding: 2.2em 0;
  transition: padding-left 0.25s ease;
  position: relative;
}
.course:first-child { padding-top: 0; }
.course:hover { padding-left: 0.6em; }
.course:hover .course-title { color: var(--accent); }
.course:hover .arrow { transform: translateX(4px); opacity: 1; }

.course-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 1em;
}
.course-num {
  font-family: 'Courier New', monospace;
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.course-title {
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-weight: 400;
  transition: color 0.25s ease;
  margin-top: 0.15em;
}
.course-desc {
  font-family: sans-serif;
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 0.5em;
  line-height: 1.5;
  max-width: 520px;
}
.course-meta {
  font-family: 'Courier New', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 0.9em;
}
.arrow {
  font-size: 1.4rem;
  color: var(--accent);
  opacity: 0.4;
  transition: transform 0.25s ease, opacity 0.25s ease;
  flex-shrink: 0;
}

/* ── FOOTER ── */
footer {
  margin-top: 6vh;
  padding-top: 2em;
  border-top: 1px solid var(--line);
  font-family: 'Courier New', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1em;
}

@media (max-width: 600px) {
  .wrap { padding: 6vh 6vw 8vh; }
  .course-top { flex-direction: column; gap: 0.3em; }
  .arrow { display: none; }
}
</style>
</head>
<body>

<div class="wrap">

  <header>
    <div class="kicker">Materi Perkuliahan — Akses Mahasiswa</div>
    <h1>Portal <em>Kuliah</em></h1>
    <p class="tagline">Pilih mata kuliah untuk melihat daftar materi yang tersedia.</p>
  </header>

  <div class="courses">

    <a class="course" href="modul24/">
      <div class="course-top">
        <div>
          <div class="course-num">01</div>
          <div class="course-title">Modul 24</div>
        </div>
        <div class="arrow">→</div>
      </div>
      <div class="course-meta">Lihat daftar materi</div>
    </a>


  </div>

  <footer>
    <span>mdianf.github.io/kuliah</span>
  </footer>

</div>

</body>
</html>
